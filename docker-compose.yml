services:
  postgres:
    image: postgres:16-alpine
    container_name: ops-catalog-postgres
    environment:
      POSTGRES_DB: ${LOCAL_DB_NAME:-ops_catalog_local}
      POSTGRES_USER: ${LOCAL_DB_USER:-opscatalog}
      POSTGRES_PASSWORD: ${LOCAL_DB_PASSWORD:-opscatalog}
    ports:
      - "5502:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${LOCAL_DB_USER:-opscatalog} -d postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ops-catalog-local-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: ops-catalog-backend
    command: /app/entrypoint.dev.sh
    volumes:
      - ./backend:/app
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    ports:
      - "8002:8000"
    env_file:
      - backend/.env.local
    environment:
      - DATABASE_URL=postgresql://opscatalog:opscatalog@postgres:5432/ops_catalog_local
      - ENVIRONMENT=local
      - DEBUG=True
      - DOCKER_ENV=true
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ops-catalog-local-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: ops-catalog-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3002:3000"
    env_file:
      - frontend/.env.local
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8002
      - NEXT_PUBLIC_ENVIRONMENT=local
      - BACKEND_API_URL=http://backend:8000
      - DOCKER_ENV=true
      - NEXT_PUBLIC_DOCKER_ENV=true
    depends_on:
      - backend
    networks:
      - ops-catalog-local-network

volumes:
  postgres_data:
  backend_static:
  backend_media:

networks:
  ops-catalog-local-network:
    driver: bridge
